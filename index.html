<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WC 2026 Knockout Wallchart</title>
  <meta name="description" content="Pick every winner of the 2026 World Cup knockouts and share your bracket with a link. No sign-up." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Saira:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="bar">
    <a class="brand" href="./" title="Start a fresh bracket" aria-label="Knockouts — start a fresh bracket">
      <span class="eyebrow">FIFA World Cup 2026</span>
      <span class="wordmark">Knockouts</span>
    </a>
    <div class="score-pill" title="Your total score so far">
      <span class="sp-label">Score</span>
      <span id="score" class="sp-value">0</span>
    </div>
    <div class="tools">
      <input id="name" class="name-input" type="text" placeholder="Name your bracket" maxlength="24" />
      <button id="copy" class="btn btn-primary" type="button" title="Copy a shareable link to your bracket">Copy link</button>
      <button id="refresh" class="btn" type="button" title="Fetch the latest match results and re-score your bracket">Refresh results</button>
      <button id="clear" class="btn btn-ghost" type="button" title="Reset all of your picks">Clear picks</button>
    </div>
  </header>
  <p id="status" class="status" role="status"></p>
  <main id="bracket"></main>
  <script type="module" src="src/main.js"></script>
</body>
</html>
